<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THOUGHT LEADER — character sheet</title>
<style>
  :root {
    --void:#0a0c10; --slate:#1b2430; --steel:#2f3b4a; --bone:#c8bfa4;
    --amber:#d9a441; --ink-faint:#6b6455;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; background:var(--void); color:var(--bone);
    font-family:var(--mono); font-size:14px; line-height:1.5;
    padding:28px 18px 60px;
  }
  .head {
    max-width:1080px; margin:0 auto 22px; border-bottom:1px solid var(--steel);
    padding-bottom:10px; display:flex; justify-content:space-between; align-items:baseline;
    font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-faint);
  }
  .head strong { color:var(--bone); font-weight:500; letter-spacing:.32em; }

  .grid {
    max-width:1080px; margin:0 auto;
    display:grid; grid-template-columns:repeat(auto-fit, minmax(196px,1fr)); gap:18px;
  }
  .card {
    background:var(--slate); border:1px solid var(--steel);
    display:flex; flex-direction:column;
  }
  .frame { background:#000; border-bottom:1px solid var(--steel); position:relative; }
  canvas.portrait {
    display:block; width:100%; height:auto; aspect-ratio:48/56;
    image-rendering:pixelated; image-rendering:crisp-edges;
  }
  .meta { padding:11px 13px 13px; }
  .name { font-size:13px; letter-spacing:.08em; color:#fff; }
  .role { font-size:10.5px; letter-spacing:.05em; color:var(--ink-faint); margin-top:3px; min-height:2.4em; }
  .tag {
    display:inline-block; margin-top:9px; font-size:9.5px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--amber); border:1px solid rgba(217,164,65,.35); padding:1px 5px;
  }

  .controls { max-width:1080px; margin:22px auto 0; display:flex; gap:16px; align-items:center; flex-wrap:wrap;
    font-size:11px; letter-spacing:.06em; color:var(--ink-faint); }
  .controls label { display:flex; gap:7px; align-items:center; cursor:pointer; text-transform:uppercase; }
  .controls button {
    background:none; border:1px solid var(--steel); color:var(--bone); font:inherit;
    font-size:10px; letter-spacing:.12em; text-transform:uppercase; padding:6px 12px; cursor:pointer;
  }
  .controls button:hover { background:var(--steel); color:#fff; }
  @media (prefers-reduced-motion:reduce){ *{animation:none!important;transition:none!important;} }
</style>
</head>
<body>
  <header class="head">
    <strong>Thought Leader</strong>
    <span>character sheet · 48×56 procedural sprites</span>
  </header>

  <section class="grid" id="grid"></section>

  <div class="controls">
    <label><input type="checkbox" id="talk" checked> animate speech</label>
    <label><input type="checkbox" id="scan" checked> crt overlay</label>
    <button id="zoom">toggle 4× / fit</button>
    <span id="fps"></span>
  </div>

const CAST = [
  { who:"VOIDT",    name:"Agent Voidt",    role:"Bureau for Emerging Threats · believes the interior is real", tag:"lead" },
  { who:"LAMPORT",  name:"Agent Lamport",  role:"Bureau for Emerging Threats · will not attest what he hasn't met", tag:"lead" },
  { who:"MARSH",    name:'"Marsh"',        role:"Senior Advisor, Political-Military Affairs · State (allegedly)", tag:"recurring" },
  { who:"ALDUNATE", name:"Ximena Aldunate",role:"CAISI · International Engagement · scoped out of the question", tag:"recurring" },
  { who:"MODEL",    name:"unnamed checkpoint", role:"the thing on the other side of the evaluation", tag:"anomaly" },
  { who:"KIRIAKOU", name:"\"John Kiriakou\"", role:"the recruiting face · rendered, no author · fits because his story fits", tag:"artifact" },
];

const SW = SPRITE_DATA.w, SH = SPRITE_DATA.h;
const REDUCED = window.matchMedia("(prefers-reduced-motion:reduce)").matches;

const RGB = {};
for (const k in SPRITE_DATA.pal) {
  const h = SPRITE_DATA.pal[k];
  RGB[k] = [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

// per-card render state so blinks and speech cycles are independent
const rigs = [];

function buildCard(entry, i) {
  const card = document.createElement("div"); card.className = "card";
  const frame = document.createElement("div"); frame.className = "frame";
  const cv = document.createElement("canvas"); cv.className = "portrait";
  cv.width = SW; cv.height = SH;
  frame.appendChild(cv);
  const meta = document.createElement("div"); meta.className = "meta";
  meta.innerHTML =
    '<div class="name">'+entry.name+'</div>' +
    '<div class="role">'+entry.role+'</div>' +
    '<div class="tag">'+entry.tag+'</div>';
  card.appendChild(frame); card.appendChild(meta);
  document.getElementById("grid").appendChild(card);

  rigs.push({
    who: entry.who,
    ctx: cv.getContext("2d"),
    cells: [],
    blinkNext: 60 + i * 23,
    blinkUntil: -1,
    // each character "speaks" in bursts, offset so the sheet isn't in lockstep
    speakPhase: i * 40,
  });
}

CAST.forEach(buildCard);

function loadBase(rig) {
  const rows = SPRITE_DATA.sprites[rig.who].base;
  for (let y = 0; y < SH; y++) rig.cells[y] = rows[y].split("");
}
function applyPatch(rig, p) {
  if (!p) return;
  for (let j = 0; j < p.rows.length; j++) {
    const r = p.rows[j];
    for (let i = 0; i < r.length; i++) rig.cells[p.y + j][p.x + i] = r[i];
  }
}

let talk = true, scan = true, frame = 0;

function drawRig(rig, f) {
  const S = SPRITE_DATA.sprites[rig.who];
  loadBase(rig);

  // speech: on for ~50 frames, off for ~40, per-character offset
  const cyc = (f + rig.speakPhase) % 90;
  const speaking = talk && !REDUCED && cyc < 50;

  if (rig.who === "MODEL") {
    if (Math.floor(f/30)%2) applyPatch(rig, S.eyesClosed);
    if (!REDUCED && f % 900 < 7) applyPatch(rig, S.ghost);
  } else if (!REDUCED) {
    if (f > rig.blinkNext) { rig.blinkUntil = f + 6; rig.blinkNext = f + 150 + Math.floor(Math.random()*280); }
    if (f < rig.blinkUntil) applyPatch(rig, S.eyesClosed);
  }

  if (speaking) {
    const ph = Math.floor(f/5) % 4;
    if (ph === 1 || ph === 3) applyPatch(rig, S.mouthMid);
    else if (ph === 2) applyPatch(rig, S.mouthOpen);
  }

  if (rig.who === "LAMPORT" && !REDUCED) {
    const t = f % 260;
    if (t < 18) {
      const gx = 16 + Math.floor(t*1.1);
      for (const y of [23,24,25]) {
        const x = gx - (y-23);
        if (x>16 && x<32 && rig.cells[y][x] !== "g") rig.cells[y][x] = "t";
      }
    }
  }

  const bob = (!REDUCED && Math.sin((f+rig.speakPhase)/47) > 0.86) ? 1 : 0;

  const img = rig.ctx.createImageData(SW, SH);
  const d = img.data;
  for (let y = 0; y < SH; y++) {
    const src = y < bob ? 0 : (y < 46 ? y - bob : y);
    for (let x = 0; x < SW; x++) {
      const c = RGB[rig.cells[src][x]];
      const i = (y*SW + x)*4;
      if (!c) { d[i+3]=0; continue; }
      d[i]=c[0]; d[i+1]=c[1]; d[i+2]=c[2]; d[i+3]=255;
    }
  }
  rig.ctx.putImageData(img, 0, 0);

  if (scan) {
    // cheap scanline pass in-canvas
    rig.ctx.globalAlpha = 0.10;
    rig.ctx.fillStyle = "#000";
    for (let y = 0; y < SH; y += 2) rig.ctx.fillRect(0, y, SW, 1);
    rig.ctx.globalAlpha = 1;
  }
}

let last = performance.now(), acc = 0, fpsEl = document.getElementById("fps");
function loop(now) {
  frame++;
  for (const rig of rigs) drawRig(rig, frame);
  acc++;
  if (now - last > 1000) { fpsEl.textContent = acc + " fps"; acc = 0; last = now; }
  requestAnimationFrame(loop);
}

document.getElementById("talk").addEventListener("change", e => talk = e.target.checked);
document.getElementById("scan").addEventListener("change", e => scan = e.target.checked);
document.getElementById("zoom").addEventListener("click", () => {
  const g = document.getElementById("grid");
  const fixed = g.style.gridTemplateColumns.includes("192px");
  g.style.gridTemplateColumns = fixed ? "" : "repeat(5, 192px)";
});

requestAnimationFrame(loop);
</script>
</body>
